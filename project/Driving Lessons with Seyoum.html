<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Driving Lessons with Seyoum — San Jose, California</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="ui-kit.css" />
<link rel="stylesheet" href="site.css" />
</head>
<body>
<div id="root" data-screen-label="Driving Lessons with Seyoum"></div>

<script src="image-slot.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Icon.jsx"></script>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/Services.jsx"></script>
<script type="text/babel" src="components/Pricing.jsx"></script>
<script type="text/babel" src="components/Booking.jsx"></script>
<script type="text/babel" src="components/Contact.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function App() {
  const homeRef = useRef(null);
  const servicesRef = useRef(null);
  const pricingRef = useRef(null);
  const bookRef = useRef(null);
  const contactRef = useRef(null);
  const [current, setCurrent] = useState("home");

  const refs = { home: homeRef, services: servicesRef, pricing: pricingRef, book: bookRef, contact: contactRef };

  const scrollTo = (id) => {
    const el = refs[id]?.current;
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 64;
      window.scrollTo({ top, behavior: "smooth" });
    }
    setCurrent(id);
  };

  // Set current section on scroll
  useEffect(() => {
    const onScroll = () => {
      const order = ["contact", "book", "pricing", "services", "home"];
      const y = window.scrollY + 100;
      for (const id of order) {
        const el = refs[id]?.current;
        if (el && el.offsetTop <= y) {
          setCurrent(id);
          return;
        }
      }
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <div className="rd-app">
      <Nav onNav={scrollTo} current={current} />
      <main>
        <div ref={homeRef}><Hero onBook={() => scrollTo("book")} onPricing={() => scrollTo("pricing")} /></div>
        <div ref={servicesRef}><Services onBook={() => scrollTo("book")} /></div>
        <div ref={pricingRef}><Pricing onBook={() => scrollTo("book")} /></div>
        <div ref={bookRef}><Booking /></div>
        <div ref={contactRef}><Contact /></div>
      </main>
      <Footer onNav={scrollTo} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
